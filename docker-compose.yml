services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: wh_calc
      POSTGRES_PASSWORD: wh_calc
      POSTGRES_DB: wh_calc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wh_calc -d wh_calc"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
